    <title>Maxfiylik Siyosati - Crypton AI</title>
    <link rel="stylesheet" href="privacy_style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
    --bg: #09090b;
    --fg: #fafafa;
    --border: #27272a;
    --muted: #a1a1aa;
    --accent: #3b82f6; /* Moviy xavfsizlik rangi */
}

body {
    background-color: var(--bg);
    color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.privacy-container {
    width: 100%;
    max-width: 600px;
}

.privacy-header {
    text-align: center;
    margin-bottom: 40px;
}

.text-muted {
    color: var(--muted);
    font-size: 0.9rem;
}

.accordion {
    border-top: 1px solid var(--border);
}

.accordion-item {
    border-bottom: 1px solid var(--border);
    transition: all 0.3s ease;
}

.accordion-trigger {
    width: 100%;
    background: none;
    border: none;
    color: inherit;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    cursor: pointer;
    outline: none;
    -webkit-tap-highlight-color: transparent;
}

.trigger-left {
    display: flex;
    align-items: center;
    gap: 16px;
}

.icon-wrapper {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.02);
}

.text-wrapper {
    display: flex;
    flex-direction: column;
    text-align: left;
}

.item-title {
    font-size: 16px;
    font-weight: 600;
}

.item-sub {
    font-size: 13px;
    color: var(--muted);
}

.chevron {
    transition: transform 0.2s ease;
    color: var(--muted);
}

/* Accordion Animatsiyasi */
.accordion-content {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.25s ease-out;
    overflow: hidden;
}

.content-inner {
    min-height: 0;
    padding-left: 60px;
    padding-bottom: 20px;
    color: var(--muted);
    font-size: 14.5px;
    line-height: 1.6;
}

.accordion-item.open .accordion-content {
    grid-template-rows: 1fr;
}

.accordion-item.open .chevron {
    transform: rotate(180deg);
    color: var(--accent);
}

.accordion-item.open .icon-wrapper {
    border-color: var(--accent);
    color: var(--accent);
}
    </style>
</head>
<body>

<div class="privacy-container">
    <header class="privacy-header">
        <h1 class="text-2xl font-bold">Maxfiylik va AI Xavfsizligi</h1>
        <p class="text-muted">Oxirgi yangilanish: 14-Aprel, 2026-yil</p>
    </header>
   <p>Sizning barcha ma'lumotlaringiz sir saqlanadi.</p>
</div>

<script src="privacy_script.js">
    document.addEventListener('DOMContentLoaded', () => {
    // Lucide ikonkalarni generatsiya qilish
    lucide.createIcons();

    const items = document.querySelectorAll('.accordion-item');

    items.forEach(item => {
        const trigger = item.querySelector('.accordion-trigger');
        
        trigger.addEventListener('click', () => {
            const isOpen = item.classList.contains('open');

            // Boshqa barcha ochiq bo'limlarni yopish (optional - agar xohlasang)
            items.forEach(i => i.classList.remove('open'));

            // Agar yopiq bo'lgan bo'lsa, ochamiz
            if (!isOpen) {
                item.classList.add('open');
            }
        });
    });
});
</script>
</body>
</html>
