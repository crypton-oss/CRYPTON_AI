<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cstyle%3Epath %7B fill: %23333; %7D @media (prefers-color-scheme: dark) %7B path %7B fill: white; %7D %7D%3C/style%3E%3Cg clip-path='url(%23clip0_4418_8984)'%3E%3Cpath d='M11.7499 9.42999L8.49992 15L7.86991 16.09L5.39991 20.31C5.21991 20.63 4.75992 20.64 4.55992 20.33L1.17991 15.28C1.06991 15.11 1.06991 14.89 1.17991 14.72L4.84993 9.22C4.93993 9.08 5.09991 9 5.26991 9H11.4999L11.7499 9.42999Z'/%3E%3Cpath d='M22.8401 14.73L16.1401 3.25C16.0601 3.09 15.8901 3 15.7101 3H8.87012C8.48012 3 8.24012 3.42 8.44012 3.75L11.5001 9L11.7501 9.42999L14.5601 14.25C14.7601 14.58 14.5201 15 14.1301 15H8.50012L7.87012 16.09C8.05012 15.77 8.51011 15.76 8.71011 16.07L11.8501 20.78C11.9401 20.92 12.1001 21 12.2701 21H18.7301C18.9001 21 19.0601 20.92 19.1501 20.78L22.8301 15.26C22.9301 15.1 22.9401 14.9 22.8401 14.73Z'/%3E%3C/g%3E%3Cdefs%3E%3CclipPath id='clip0_4418_8984'%3E%3Crect width='24' height='24' fill='white'/%3E%3C/clipPath%3E%3C/defs%3E%3C/svg%3E">

    <title>Profile - iOS Style</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ASOSIY SOZLAMALAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* HEADER QISMI */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            background: #1c1c1e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #38383a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .camera-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #007aff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #000;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .camera-btn:active { transform: scale(0.9); }

        .profile-header h1 {
            margin-top: 15px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .profile-header p {
            color: #8e8e93;
            font-size: 14px;
            margin-top: 4px;
        }

        /* IOS GROUPED LIST */
        .settings-group {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid #2c2c2e;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #2c2c2e;
            transition: background 0.3s;
        }

        .row:last-child { border-bottom: none; }

        .icon-box {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        .info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .input-field {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            width: 100%;
            padding: 2px 0;
        }

        .input-field:not([readonly]) {
            color: #0a84ff;
        }

        /* TUGMALAR */
        .action-btn {
            background: none;
            border: none;
            color: #0a84ff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            padding: 5px;
            transition: opacity 0.2s;
        }

        .action-btn:active { opacity: 0.5; }

        .save-btn {
            color: #30d158;
            font-weight: 700;
            display: none;
        }

        .hidden { display: none; }

        .hint {
            text-align: center;
            font-size: 12px;
            color: #48484a;
            padding: 0 20px;
            line-height: 1.4;
        }


        .ios-toast {
    position: fixed;
    top: -100px; /* Dastlab ko'rinmaydi */
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 350px;
    background: rgba(28, 28, 30, 0.8); /* iOS Dark background */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 12px 20px;
    z-index: 9999;
    transition: top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.ios-toast.show {
    top: 20px; /* Ko'rsatilganda 20px pastga tushadi */
}

.ios-toast-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

#toast-icon {
    width: 20px;
    height: 20px;
    color: #30d158; /* iOS Success Green */
}

#toast-message {
    color: white;
    font-size: 15px;
    font-weight: 500;
}


.default-avatar {
    width: 110px;
    height: 110px;
    background-color: rgba(255, 255, 255, 0.1); /* Shaffof oq fon */
    border-radius: 50%; /* To'garak shakli */
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(255, 255, 255, 0.05); /* Nozik chegara */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); /* Yengil soya */
}

.default-avatar i {
    width: 55px; /* Belgining o'lchami */
    height: 55px;
    color: rgba(255, 255, 255, 0.6); /* Belgining rangi (xira oq) */
}

/* Kamera tugmasi to'g'ri joylashishi uchun avatar-wrapper ni tekshiramiz */
.avatar-wrapper {
    position: relative;
    width: 110px;
    margin: 0 auto 15px;
}

.top-nav {
    display: flex;
    align-items: center;
    padding: 15px 0;
    margin-bottom: 10px;
    margin-top: -19%;
    margin-right: 0%;
    
    
}


.back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #008cff; /* Oq rang */
    text-decoration: none;
    font-size: 17px; /* iOS standart o'lchami */
    font-weight: 400;
    transition: opacity 0.2s;
}

.back-btn:active {
    opacity: 0.3; /* Bosilganda iOS effekti */
}

.back-btn i {
    width: 24px;
    height: 24px;
    stroke-width: 2.5px; /* iOS uslubidagi qalinroq strelka */
}
    </style>
</head>
<body>
<div class="top-nav">
    <a href="/chat" class="back-btn">
        <i data-lucide="chevron-left"></i>
        <span>Chat</span>
    </a>
</div>
    <div class="container">
     <div class="profile-header">
    <div class="avatar-wrapper">
        <div id="defaultAvatar" class="default-avatar">
            <i data-lucide="user"></i>
        </div>
        
        <div class="camera-btn">
            <i data-lucide="camera" style="width: 16px; color: white;"></i>
        </div>
    </div>
    <h1 id="topName">User Profile</h1>
    <p>System Settings</p>
</div>

        <div class="settings-group">
            
            <div class="row" id="row-username">
                <div class="icon-box" style="background: rgba(10, 132, 255, 0.1);">
                    <i data-lucide="user" style="color: #0a84ff; width: 18px;"></i>
                </div>
                <div class="info">
                    <span class="label">Username</span>
                    <input type="text" id="usernameInput" class="input-field" value="{{ username }}" readonly>
                </div>
                <button class="action-btn edit-trigger" onclick="enableEdit('usernameInput', this)">Edit</button>
                <button class="action-btn save-btn" onclick="saveData('usernameInput', this)">Save</button>
            </div>

            <div class="row" id="row-email">
                <div class="icon-box" style="background: rgba(191, 90, 242, 0.1);">
                    <i data-lucide="mail" style="color: #bf5af2; width: 18px;"></i>
                </div>
                <div class="info">
                    <span class="label">Email Address</span>
                    <input type="email" id="emailInput" class="input-field" value="{{ email }}" readonly>
                </div>
                <button class="action-btn edit-trigger" onclick="enableEdit('emailInput', this)">Edit</button>
                <button class="action-btn save-btn" onclick="saveData('emailInput', this)">Save</button>
            </div>

            <div class="row" id="row-password">
                <div class="icon-box" style="background: rgba(255, 159, 10, 0.1);">
                    <i data-lucide="lock" style="color: #ff9f0a; width: 18px;"></i>
                </div>
                <div class="info">
                    <span class="label">Password</span>
                    <input type="password" id="passwordInput" class="input-field" value="{{ password }}" readonly>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <i data-lucide="eye" style="width: 16px; color: #48484a; cursor: pointer;" onclick="togglePass()"></i>
                    <button class="action-btn edit-trigger" onclick="enableEdit('passwordInput', this)">Edit</button>
                    <button class="action-btn save-btn" onclick="saveData('passwordInput', this)">Save</button>
                </div>
            </div>

        </div>

        <p class="hint">Xavfsizlik yuzasidan, barcha ma'lumotlar end-to-end shifrlangan holda saqlanadi.</p>
    </div>
<div id="ios-toast" class="ios-toast">
    <div class="ios-toast-content">
        <i data-lucide="check-circle" id="toast-icon"></i>
        <span id="toast-message">Muvaffaqiyatli saqlandi!</span>
    </div>
</div>
    <script>
        lucide.createIcons();

        // Tahrirlashni yoqish
        function enableEdit(inputId, btn) {
            const input = document.getElementById(inputId);
            input.removeAttribute('readonly');
            input.focus();
            
            // Tugmalarni almashtirish
            btn.style.display = 'none';
            btn.nextElementSibling.style.display = 'block';
            
            // Satr fonini biroz yoritish
            input.closest('.row').style.background = 'rgba(255,255,255,0.03)';
        }

        // Ma'lumotni saqlash
async function saveData(inputId, btn) {
    const input = document.getElementById(inputId);
    const newValue = input.value.trim();
    const fieldType = inputId.replace('Input', '').toLowerCase(); // 'username', 'email' yoki 'password'

    try {
        // 1. Supabase-da yangilash (Sening mavjud koding)
        // ... (Supabase update kodi) ...

        // 2. Flask Sessiyasini yangilash (MUHIM QISM)
        const response = await fetch('/api/update_profile_session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                field: fieldType,
                value: newValue
            })
        });

        if (response.ok) {
            showIOSToast("Ma'lumotlar saqlandi");
            
            // UI-ni qulflash
            input.setAttribute('readonly', true);
            btn.style.display = 'none';
            btn.previousElementSibling.style.display = 'block';
            
            // Profil tepasidagi ismni ham darhol yangilaymiz
            if(fieldType === 'username') {
                document.getElementById('topName').innerText = newValue;
            }
        }

    } catch (error) {
        showIOSToast("Xatolik: " + error.message, "error");
    }
}

        // Parol ko'rsatish
        function togglePass() {
    const passInput = document.getElementById('passwordInput');
    const eyeIcon = document.querySelector('[data-lucide="eye"]');
    
    if (passInput.type === 'password') {
        passInput.type = 'text';
        passInput.style.color = '#ff9f0a'; // iOS Orange rangi
    } else {
        passInput.type = 'password';
        passInput.style.color = '#ffffff';
    }
}

// Sahifa yuklanganda parolni tekshirish (Debug uchun)
document.addEventListener('DOMContentLoaded', () => {
    const passValue = document.getElementById('passwordInput').value;
    if(passValue === "NoPasswordSet" || passValue === "") {
        console.warn("Parol sessiyadan kelmadi!");iz
    // (Buning uchun HTML-da yashirin input yoki to'g'ridan-to'g'ri render ishlatishing mumkin)
    
    // Masalan, agar jinja2 ishlatsang:
    const username = "{{ session.get('username', 'Nomalum') }}";
    const email = "{{ session.get('user_email', 'Nomalum') }}";
    const password = "{{ session.get('user_password', '********') }}";

    document.getElementById('usernameInput').value = username;
    document.getElementById('emailInput').value = email;
    document.getElementById('passwordInput').value = password;
    document.getElementById('topName').innerText = username;
    }
});


function showIOSToast(message, type = 'success') {
    const toast = document.getElementById('ios-toast');
    const toastMsg = document.getElementById('toast-message');
    const toastIcon = document.getElementById('toast-icon');

    toastMsg.innerText = message;
    
    // Turiga qarab rangni o'zgartirish (Success yoki Error)
    if (type === 'error') {
        toastIcon.style.color = '#ff453a'; // iOS Red
        toastIcon.setAttribute('data-lucide', 'alert-circle');
    } else {
        toastIcon.style.color = '#30d158'; // iOS Green
        toastIcon.setAttribute('data-lucide', 'check-circle');
    }
    
    lucide.createIcons(); // Ikonkani yangilash

    // Toastni ko'rsatish
    toast.classList.add('show');

    // 3 soniyadan keyin yashirish
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}
    </script>
</body>
</html>
